spring:
  application:
    name: openbake

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

# ── ddl-auto 정책 (팀 결정 대기 중) ─────────────────────────
# 강의는 create + H2 인메모리 (재시작마다 초기화되는 강의용 세팅).
# 우리는 PostgreSQL을 5명이 공유하므로 그대로 쓸 수 없음.
#
#   update   : 현재 값. 초기 개발이 빠름.
#              단점 - 컬럼 삭제/이름변경이 반영 안 됨. 옛 컬럼이 계속 남아
#                    팀원 간 로컬 스키마가 조용히 어긋남.
#                    부하 테스트 시 인덱스 존재 여부를 확신할 수 없음.
#   none     : 스키마를 수동/마이그레이션 도구로 관리.
#   validate : 엔티티와 실제 스키마 일치 여부만 검증.
#
# → 스키마가 확정되면 재논의 필요.
# ───────────────────────────────────────────────────────

# ── 토스페이먼츠 설정 ──────────────────────────────────────
# 테스트 시크릿키는 토스 개발자센터에서 발급.
# 운영 시크릿키는 환경변수로 주입.
payment:
  toss:
    secret-key: ${TOSS_SECRET_KEY:test_sk_xxxxxxxxxxxxxxx}

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace

management:
  endpoints:
    web:
      exposure:
        include: health,info
