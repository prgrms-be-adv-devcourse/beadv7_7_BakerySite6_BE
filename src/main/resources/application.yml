spring:
  application:
    name: openbake

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-init-sql: SET SESSION lock_timeout = '10s'

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

# Batch 설정 추가
# job.enabled: false : 서버가 시작될 때 정산이 자동 실행되는 것을 막고,
# 나중에 스케줄러나 API가 명시적으로 실행하도록 설정
# Spring Batch는 실행 이력을 저장하기 위한 메타데이터 테이블 사용을 위함
# (최초 1회만 사용 또는 script로 생성되는지 확인 예정)
  sql:
    init:
      mode: never
      schema-locations: classpath:org/springframework/batch/core/schema-postgresql.sql

  batch:
    job:
      enabled: false

# ── ddl-auto 정책 (팀 결정 대기 중) ─────────────────────────
# 강의는 create + H2 인메모리 (재시작마다 초기화되는 강의용 세팅).
# 우리는 PostgreSQL을 5명이 공유하므로 그대로 쓸 수 없음.
#
#   update   : 현재 값. 초기 개발이 빠름.
#              단점 - 컬럼 삭제/이름변경이 반영 안 됨. 옛 컬럼이 계속 남아
#                    팀원 간 로컬 스키마가 조용히 어긋남.
#                    부하 테스트 시 인덱스 존재 여부를 확신할 수 없음.
#   none     : 스키마를 수동/마이그레이션 도구로 관리.
#   validate : 엔티티와 실제 스키마 일치 여부만 검증.
#
# → 스키마가 확정되면 재논의 필요.
# ───────────────────────────────────────────────────────

# ── 토스페이먼츠 설정 ──────────────────────────────────────
# 테스트 시크릿키는 토스 개발자센터에서 발급.
# 운영 시크릿키는 환경변수로 주입.
payment:
  toss:
    secret-key: ${TOSS_SECRET_KEY:test_sk_xxxxxxxxxxxxxxx}
    connect-timeout: 3000
    read-timeout: 15000

# 매월 1일 오후 3시 "0 0 15 1 * *"
settlement:
  batch:
    monthly:
      cron: "-"
      zone: Asia/Seoul

openbake:
  cart:
    # 장바구니 만료 시간
    # 장바구니 생성 = 재고 선점이라 결제하지 않고 방치되면 재고가 묶인다.
    # 짧을수록 재고 회수는 빠르지만 결제 도중 만료될 위험이 커진다.
    ttl: 15m

    # 만료 배치 실행 주기
    # 짧을수록 재고 회수가 빠르지만 조회 부하가 늘어난다.
    # 이전 실행이 끝난 뒤부터 세는 fixedDelay 라 실행이 겹치지 않는다.
    expiration-delay: PT5M

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace

management:
  endpoints:
    web:
      exposure:
        include: health,info

oauth:
  providers:
    google:
      issuer: https://accounts.google.com
      jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
      client-id: ${GOOGLE_CLIENT_ID}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000    # 30분 (ms)
  refresh-token-expiration: 1209600000 # 14일 (ms)
