services:
  postgres:
    image: postgres:17
    container_name: openbake-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: openbake
      POSTGRES_USER: openbake
      POSTGRES_PASSWORD: openbake
    volumes:
      - openbake-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbake"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: openbake-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  openbake-pg-data:
